services:
  nextjs:
    build:
      context: .
      args:
        # TEMP (test): pass SITE_TEST_MODE into the build so static pages get
        # placeholdered contact info. Defaults off. Set it in the host env (or
        # compose .env) to "true" for a test build. Runtime gating still comes
        # from .env.local via env_file below.
        SITE_TEST_MODE: ${SITE_TEST_MODE:-false}
    container_name: aman-nextjs
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    networks:
      - traefik

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.aman-nextjs.rule=Host(`aman.mehdify.tech`)"
      - "traefik.http.routers.aman-nextjs.entrypoints=websecure"
      - "traefik.http.routers.aman-nextjs.tls=true"
      - "traefik.http.routers.aman-nextjs.tls.certresolver=le"
      - "traefik.http.services.aman-nextjs.loadbalancer.server.port=3000"

networks:
  traefik:
    external: true
    name: web
